name: Android CI

on:
  push:
    paths:
      - "android-app/**"
      - ".github/workflows/android-ci.yml"
  pull_request:
    paths:
      - "android-app/**"
      - ".github/workflows/android-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Test, lint, and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-app

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
          cache-dependency-path: android-app/gradle/wrapper/gradle-wrapper.properties

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Run unit tests, Android lint, and debug build
        run: ./gradlew --no-daemon :app:testDebugUnitTest :app:lintDebug :app:assembleDebug

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-lint-report
          path: android-app/app/build/reports/lint-results-debug.html
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload test APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Quest-Home-Switcher-debug-test-only
          path: android-app/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
